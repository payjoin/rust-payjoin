name: Continuous integration

on: [push, pull_request]

jobs:
  Test-Linux:
    name: Linux matrix tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [1.63.0, stable, nightly] # full toolchain set
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Install ${{ matrix.rust }} toolchain"
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: "Use cache"
        uses: Swatinem/rust-cache@v2
      - name: Run full test suite
        run: RUST_LOG=debug bash contrib/test.sh

  Test-Stable-OtherOS:
    name: Stable tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Install stable toolchain"
        uses: dtolnay/rust-toolchain@stable
      - name: "Use cache"
        uses: Swatinem/rust-cache@v2
      - name: Run unit tests only (no bitcoind)
        run: |
          cargo test --workspace --lib --bins --examples --verbose


  Format:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Install nightly toolchain"
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: "Use cache"
        uses: Swatinem/rust-cache@v2
      - name: "Run formatting check"
        run: cargo fmt --all -- --check
  
  Format-FFI:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Install nightly toolchain"
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: "Use cache"
        uses: Swatinem/rust-cache@v2
      - name: "Run formatting check"
        run: cd payjoin-ffi && cargo fmt --all -- --check
  
  Lint-FFI:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Install nightly toolchain"
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - name: "Use cache"
        uses: Swatinem/rust-cache@v2
      - name: "Run linting check"
        run: cd payjoin-ffi && bash contrib/lint.sh

  Lint:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Install nightly toolchain"
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - name: "Use cache"
        uses: Swatinem/rust-cache@v2
      - name: "Run code linting"
        run: bash contrib/lint.sh
      - name: "Run documentation linting"
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features --document-private-items

  Coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    env:
      # Override the value from the rust-toolchain file
      # This is necessary because even though the correct toolchain
      # is explicitly specified for the rust-toolchain action,
      # rustup honors the rust-toolchain file over the default
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Install toolchain"
        # rust-cache usage with stable Rust is most effective, as a cache is tied to the Rust version
        uses: dtolnay/rust-toolchain@stable
      - name: "Use cache"
        uses: Swatinem/rust-cache@v2
      - name: "Install cargo-llvm-cov"
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: "Generate code coverage for tests"
        run: bash contrib/coverage.sh
      - name: "Upload report to coveralls"
        uses: coverallsapp/github-action@v2
  
  CodeSpell: 
    name: Code spell check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: codespell-project/actions-codespell@v2
