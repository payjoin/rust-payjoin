[workspace]
members = ["payjoin", "payjoin-cli", "payjoin-directory", "payjoin-test-utils", "payjoin-ffi"]
resolver = "2"

[patch.crates-io.payjoin]
path = "payjoin"

[patch.crates-io.payjoin-directory]
path = "payjoin-directory"

[profile.release-smaller]
inherits = "release"
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
