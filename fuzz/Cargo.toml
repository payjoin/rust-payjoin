[package]
name = "payjoin-fuzz"
version = "0.0.1"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[features]
default = ["libfuzzer_fuzz"]
afl_fuzz = ["afl"]
honggfuzz_fuzz = ["honggfuzz"]
libfuzzer_fuzz = ["libfuzzer-sys"]

[dependencies]
afl = { version = "0.17.0", optional = true }
bitcoin = { version = "0.32.7", features = ["base64"] }
bitcoin_uri = { version = "0.1.0" }
honggfuzz = { version = "0.5.58", default-features = false, optional = true }
libfuzzer-sys = { version = "0.4.10", optional = true }
ohttp = { package = "bitcoin-ohttp", version = "0.6.0" }
payjoin = { path = "../payjoin", default-features = false, features = [
  "_core",
  "v1",
  "v2",
] }
payjoin-test-utils = { path = "../payjoin-test-utils" }
url = { version = "2.5.4", default-features = false, features = ["serde"] }

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

# [patch.crates-io]
# payjoin-directory = { path = "../payjoin-directory" }
# payjoin-test-utils = { path = "../payjoin-test-utils" }
# payjoin = { path = "../payjoin" }

[[bin]]
name = "uri_deserialize_pjuri"
path = "fuzz_targets/uri/deserialize_pjuri.rs"
test = false
doc = false
bench = false

[[bin]]
name = "bitcoin_deserialize_psbt"
path = "fuzz_targets/bitcoin/deserialize_psbt.rs"
test = false
doc = false
bench = false
